<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="avatarTitle avatarDesc">
  <title id="avatarTitle">Default profile avatar</title>
  <desc id="avatarDesc">Portrait-style realistic default user avatar.</desc>
  <defs>
